name: Build Windows App Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_VERSION: 1.0.13
  RELEASE_TAG: latest

jobs:
  build:
    name: Build jpackage app image
    runs-on: windows-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile and copy runtime dependencies
        run: >
          mvn -B clean compile dependency:copy-dependencies
          -DincludeScope=runtime
          -DoutputDirectory=target/dependency

      - name: Create Windows app icon
        run: |
          $pngPath = "src\main\resources\hhlhh\icon\app.png"
          $icoPath = "target\jpackage\app.ico"
          New-Item -ItemType Directory -Force -Path (Split-Path $icoPath) | Out-Null

          $pngBytes = [System.IO.File]::ReadAllBytes($pngPath)
          $stream = [System.IO.File]::Create($icoPath)
          $writer = New-Object System.IO.BinaryWriter($stream)
          try {
            $writer.Write([UInt16]0)
            $writer.Write([UInt16]1)
            $writer.Write([UInt16]1)
            $writer.Write([Byte]0)
            $writer.Write([Byte]0)
            $writer.Write([Byte]0)
            $writer.Write([Byte]0)
            $writer.Write([UInt16]1)
            $writer.Write([UInt16]32)
            $writer.Write([UInt32]$pngBytes.Length)
            $writer.Write([UInt32]22)
            $writer.Write($pngBytes)
          } finally {
            $writer.Dispose()
            $stream.Dispose()
          }

      - name: Build app image
        run: >
          jpackage
          --type app-image
          --name YtDlpService
          --dest target\jpackage
          --icon target\jpackage\app.ico
          --module-path "target\classes;target\dependency"
          --module hhlhh/hhlhh.App
          --app-version $env:APP_VERSION
          --add-modules javafx.controls,javafx.fxml,java.net.http,jdk.crypto.ec
          --vendor "HHLHH"

      - name: Zip app image
        run: Compress-Archive -Path target\jpackage\YtDlpService -DestinationPath target\jpackage\YtDlpService.zip -Force

      - name: Write release notes
        run: git log -1 --pretty=%B | Out-File -FilePath target\jpackage\release-notes.md -Encoding utf8

      - name: Upload app image
        uses: actions/upload-artifact@v4
        with:
          name: YtDlpService
          path: app/target/jpackage/YtDlpService.zip

      - name: Publish GitHub release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "$env:RELEASE_TAG"
          $title = "v$env:APP_VERSION"
          $asset = "target\jpackage\YtDlpService.zip"
          $notes = "target\jpackage\release-notes.md"

          git tag -f $tag "${{ github.sha }}"
          git push origin "refs/tags/$tag" --force

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title $title --notes-file $notes --latest
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title $title --notes-file $notes --target "${{ github.sha }}" --latest
          }
